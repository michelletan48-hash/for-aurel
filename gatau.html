<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cie 18</title>
    <style>
        body {
            background-color: #fff9c4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center; /* Menjaga semua elemen di tengah secara horizontal */
        }

        .cake-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Lilin Pas di Tengah */
        .candle {
            width: 12px;
            height: 40px;
            background: linear-gradient(to bottom, #ff5252, #ff1744);
            border-radius: 4px;
            position: relative;
            z-index: 10;
        }

        .flame {
            width: 16px;
            height: 24px;
            background-color: #ff9800;
            border-radius: 50% 50% 35% 35%;
            position: absolute;
            top: -25px;
            left: -2px;
            box-shadow: 0 0 15px #ffeb3b;
            animation: move 0.5s infinite alternate;
        }

        /* Lapisan Atas */
        .layer-top {
            width: 160px;
            height: 50px;
            background-color: #f48fb1;
            border-radius: 10px 10px 0 0;
            margin-top: -5px; /* Menempelkan lilin */
            border-bottom: 4px solid rgba(0,0,0,0.1);
        }

        /* Lapisan Bawah */
        .layer-bottom {
            width: 200px;
            height: 70px;
            background-color: #8d6e63;
            border-radius: 10px 10px 5px 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Piring */
        .plate {
            width: 260px;
            height: 15px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin-top: -10px;
        }

        h1 {
            color: #ad1457;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        @keyframes move {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="cake-wrapper">
            <!-- Lilin -->
            <div class="candle">
                <div class="flame"></div>
            </div>
            
            <!-- Kue Lapisan Atas -->
            <div class="layer-top"></div>
            
            <!-- Kue Lapisan Bawah -->
            <div class="layer-bottom"></div>
            
            <!-- Piring -->
            <div class="plate"></div>
        </div>

    </div>

</body>
</html>
